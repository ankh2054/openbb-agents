  agent-36-pdf-citations:
    build:
      context: .
      args:
        AGENT_DIR: "36-vanilla-agent-pdf-citations"
    expose:
      - "8095"
    environment:
      - OPENAI_BASE_URL=http://litellm:4000
      - OPENAI_API_KEY=sk-fake-key
      - VIRTUAL_HOST=pdf-citations.agent.sentnl.io
      - VIRTUAL_PORT=8095
      - LETSENCRYPT_HOST=pdf-citations.agent.sentnl.io
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    depends_on:
      - litellm
    command: ["uvicorn", "vanilla_agent_pdf_citations.main:app", "--host", "0.0.0.0", "--port", "8095"]
    networks:
      - default
